<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ARCADE OVERDRIVE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

  :root {
    --void:    #02020a;
    --cyan:    #00ffffad;
    --magenta: #FF00FF;
    --amber:   #FFB300;
    --red:     #FF003C;
    --green:   #00FF88;
    --panel:   rgba(0,255,255,0.04);
    --font-display: 'Orbitron', monospace;
    --font-mono:    'Share Tech Mono', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--void);
    color: var(--cyan);
    font-family: var(--font-mono);
    overflow: hidden;
    height: 100vh; width: 100vw;
    user-select: none;
  }

  body::after {
    content: "";
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.18) 4px);
    pointer-events: none; z-index: 9000;
  }

  #flash {
    position: fixed; inset: 0;
    background: #fff; opacity: 0;
    pointer-events: none; z-index: 8999;
    mix-blend-mode: overlay;
  }
  @keyframes flash { 0%{opacity:.7} 100%{opacity:0} }
  .flashing { animation: flash .35s ease-out forwards !important; }

  @keyframes shake {
    0%,100%{ transform:translate(0,0) }
    20%{ transform:translate(-18px,10px) rotate(-2deg) }
    40%{ transform:translate(18px,-14px) rotate(2deg) }
    60%{ transform:translate(-10px,18px) rotate(-1deg) }
    80%{ transform:translate(10px,-10px) rotate(1deg) }
  }
  .shaking { animation: shake .45s ease both !important; }

  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    background: var(--void);
    transition: opacity .4s;
  }
  .screen.hidden { opacity:0; pointer-events:none; }

  #setup-screen { gap: 20px; padding: 20px; }

  .title-svg-wrap { width: min(600px, 95vw); }

  .setup-actions {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    width: min(480px, 92vw);
  }

  .btn {
    font-family: var(--font-display);
    font-size: clamp(.7rem, 2.2vw, 1.1rem);
    letter-spacing: 3px;
    text-transform: uppercase;
    border: none; cursor: pointer;
    background: none;
    color: var(--cyan);
    width: 100%;
    padding: 0;
    position: relative;
  }
  .btn svg { width:100%; display:block; overflow:visible; }
  .btn .btn-text {
    pointer-events: none;
    position: absolute;
    inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: clamp(.65rem, 2vw, 1rem);
    font-weight: 700;
    letter-spacing: 4px;
    text-shadow: 0 0 12px currentColor;
  }
  .btn:hover .btn-rect { stroke-width: 3; filter: drop-shadow(0 0 12px currentColor); }
  .btn:hover .btn-text { color: #fff; }
  .btn:active { transform: scale(.97); }

  #banks-list {
    display: flex; flex-direction: column; gap: 8px;
    width: 100%; max-height: 200px; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: var(--cyan) transparent;
  }
  #banks-list::-webkit-scrollbar { width: 4px; }
  #banks-list::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; }

  .bank-entry { display: flex; align-items: center; gap: 8px; }
  .bank-entry .btn { flex: 1; }
  .bank-del {
    font-family: var(--font-mono); font-size: 1rem;
    background: none; border: 1px solid var(--red);
    color: var(--red); cursor: pointer; padding: 4px 10px;
    border-radius: 2px; flex-shrink: 0;
    text-shadow: 0 0 6px var(--red);
  }
  .bank-del:hover { background: var(--red); color: #000; }

  #game-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    z-index: 50;
    pointer-events: none;
  }
  #game-screen.active { pointer-events: all; }

  #bg-svg {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    z-index: 1; pointer-events: none;
  }

  #hud-svg {
    position: fixed; top: 0; left: 0;
    width: 100%; z-index: 60;
    pointer-events: none;
  }

  /* ── LEVEL BADGE on HUD ── */
  #level-badge-wrap {
    position: fixed;
    top: 6px; left: 50%; transform: translateX(-50%);
    z-index: 65;
    pointer-events: none;
    display: flex; flex-direction: column; align-items: center;
  }

  #options-area {
    position: fixed;
    top: 100px; left: 0; right: 0;
    display: flex; justify-content: space-around; align-items: center;
    flex-wrap: wrap; gap: 16px;
    padding: 10px 5vw;
    z-index: 70;
    pointer-events: all;
  }

  .opt-wrap {
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center;
    gap: 8px;
    animation: warpIn .5s cubic-bezier(.175,.885,.32,1.275) backwards;
  }
  @keyframes warpIn {
    0%{ transform: scale(0) translateY(-60px); opacity:0; filter:blur(8px); }
    70%{ transform: scale(1.1) translateY(8px); opacity:1; filter:blur(0); }
    100%{ transform: scale(1) translateY(0); opacity:1; }
  }
  .opt-wrap:hover .opt-svg { filter: drop-shadow(0 0 20px var(--magenta)); }
  .opt-wrap:hover .opt-svg .ring { stroke: var(--magenta); }
  .opt-wrap:hover .opt-svg .core { fill: var(--magenta); }
  .opt-wrap:active { transform: scale(.95); }

  .opt-svg { width: clamp(70px, 12vw, 110px); height: clamp(70px, 12vw, 110px); overflow: visible; }
  .opt-svg .ring { stroke: var(--cyan); fill: none; stroke-width: 2; transition: stroke .25s; }
  .opt-svg .core { fill: var(--cyan); transition: fill .25s; }

  .opt-label-html {
    position: relative;
    width: clamp(120px, 20vw, 190px);
    min-height: 42px;
    background: rgba(0,0,0,0.85);
    border-radius: 3px;
    padding: 8px 12px;
    box-sizing: border-box;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.6rem, 1.4vw, 0.78rem);
    font-weight: 700;
    letter-spacing: 1.5px;
    line-height: 1.5;
    word-break: break-word;
    transition: max-height 0.25s ease, box-shadow 0.25s;
    max-height: 90px;
    overflow: hidden;
  }
  .opt-wrap:hover .opt-label-html {
    max-height: 260px;
    overflow-y: auto;
    box-shadow: 0 0 18px currentColor;
    z-index: 200;
  }
  .opt-label-html::before, .opt-label-html::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    border-color: currentColor;
    border-style: solid;
  }
  .opt-label-html::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
  .opt-label-html::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

  #question-area {
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 70;
    display: flex; flex-direction: column; align-items: center;
    gap: 10px;
    padding: 0 0 14px;
    background: linear-gradient(to top, rgba(2,2,10,.98) 55%, transparent);
    pointer-events: all;
  }

  #q-box-wrap { width: min(900px, 96vw); position: relative; }

  #q-box {
    width: 100%;
    max-height: 150px;
    overflow-y: auto;
    border: 1.5px solid rgba(0,255,255,0.35);
    border-radius: 4px;
    background: rgba(0,0,0,0.82);
    padding: 14px 20px 24px;
    box-sizing: border-box;
    box-shadow: 0 0 18px rgba(0,255,255,0.1) inset, 0 0 30px rgba(0,255,255,0.06);
    scrollbar-width: thin;
    scrollbar-color: #00FFFF transparent;
  }
  #q-box::-webkit-scrollbar { width: 4px; }
  #q-box::-webkit-scrollbar-thumb { background: #00FFFF; border-radius: 2px; }

  #q-corners {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 2;
    width: 100%; height: 100%;
    overflow: visible;
  }

  #q-box-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 4px;
    height: 26px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    pointer-events: none;
    border-radius: 0 0 4px 4px;
    z-index: 3;
  }

  #q-text {
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.8rem, 1.8vw, 1rem);
    font-weight: 700;
    color: whitesmoke;
    letter-spacing: 1.5px;
    line-height: 1.65;
    text-shadow: 0 0 10px rgba(0,255,255,0.55);
    word-break: break-word;
    white-space: pre-wrap;
    user-select: text;
    -webkit-user-select: text;
  }

  #next-btn-wrap { display: none; }
  #next-btn-wrap .btn { width: 280px; }

  .combat-float {
    position: fixed;
    font-family: var(--font-display);
    font-size: clamp(1.4rem, 4vw, 2.5rem);
    font-weight: 900;
    letter-spacing: 3px;
    pointer-events: none;
    z-index: 500;
    text-shadow: 0 0 20px currentColor;
    animation: floatUp 1.1s ease-out forwards;
  }
  @keyframes floatUp {
    0%  { transform: translateY(0) scale(.6); opacity:0; }
    20% { transform: translateY(-20px) scale(1.4); opacity:1; }
    100%{ transform: translateY(-90px) scale(1); opacity:0; }
  }

  .panel-overlay {
    position: fixed; inset: 0;
    background: rgba(2,2,10,.88);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 200;
    gap: 20px;
    backdrop-filter: blur(4px);
  }
  .panel-overlay.hidden { display: none; }
  .panel-svg-wrap { width: min(520px, 90vw); }

  /* ── LEVEL INTRO OVERLAY ── */
  #level-intro {
    position: fixed; inset: 0;
    background: rgba(2,2,10,0.96);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 300;
    gap: 0;
    backdrop-filter: blur(6px);
    animation: introFadeIn .4s ease forwards;
  }
  #level-intro.hidden { display: none; }
  @keyframes introFadeIn { from{opacity:0;transform:scale(1.04)} to{opacity:1;transform:scale(1)} }

  /* ── LEVEL PROGRESS BAR (inside HUD area) ── */
  #level-progress-bar {
    position: fixed;
    top: 92px; left: 0; right: 0;
    height: 3px;
    z-index: 62;
    pointer-events: none;
    background: rgba(0,255,255,0.08);
  }
  #level-progress-fill {
    height: 100%;
    background: linear-gradient(to right, #00FFFF, #FF00FF);
    transition: width 0.5s ease;
    box-shadow: 0 0 8px #FF00FF;
    width: 0%;
  }

  @media (max-width: 480px) { #options-area { gap: 10px; padding: 8px 3vw; } }
  @media (max-height: 620px) { #options-area { top: 78px; } }

  /* ── RESPONSIVENESS / TOUCH FEEL ── */
  .btn, .opt-wrap, .ls-tile, .bank-del { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .btn-text svg { flex-shrink: 0; }
  .btn-text { gap: 8px; }

  /* ── ARMED (locked-on) TARGET STATE — first tap arms, second tap fires ── */
  .opt-wrap.armed .opt-svg { filter: drop-shadow(0 0 22px var(--green)); }
  .opt-wrap.armed .opt-svg .ring { stroke: var(--green); }
  .opt-wrap.armed .opt-svg .core { fill: var(--green); }
  .opt-wrap.armed .opt-label-html {
    max-height: 260px;
    overflow-y: auto;
    box-shadow: 0 0 18px var(--green);
    border-color: var(--green) !important;
    z-index: 200;
  }
  .opt-wrap.armed { animation: armedPulse 0.9s ease-in-out infinite; }
  @keyframes armedPulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.045); } }
  .opt-wrap .arm-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 1.5px;
    color: var(--green);
    text-shadow: 0 0 8px var(--green);
    opacity: 0;
    height: 0;
    overflow: hidden;
    transition: opacity .2s;
  }
  .opt-wrap.armed .arm-hint { opacity: 1; height: auto; }

  #targeting-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 2px;
    color: rgba(0,255,255,0.45);
    text-align: center;
    padding-bottom: 2px;
  }

  /* ── LEVEL SELECT SCREEN ── */
  #levelselect-screen { gap: 16px; padding: 20px; }
  #ls-bank-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: rgba(0,255,255,0.55);
  }
  #ls-grid {
    display: flex; flex-wrap: wrap; gap: 14px;
    justify-content: center;
    max-width: 640px;
    max-height: 46vh;
    overflow-y: auto;
    padding: 8px;
    scrollbar-width: thin; scrollbar-color: var(--cyan) transparent;
  }
  #ls-grid::-webkit-scrollbar { width: 4px; }
  #ls-grid::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; }
  .ls-tile {
    width: 96px; height: 96px;
    cursor: pointer;
    position: relative;
  }
  .ls-tile.locked { cursor: not-allowed; }
  .ls-tile svg { width: 100%; height: 100%; display: block; }
  .ls-tile:not(.locked):hover svg { filter: drop-shadow(0 0 14px var(--magenta)); }
  .ls-tile:not(.locked):active { transform: scale(.94); }
  #ls-back-wrap { width: min(320px, 90vw); }

  /* ── CHECKPOINT CHOICE PANEL ── */
  #checkpoint-choice-panel .panel-svg-wrap { width: min(480px, 90vw); }
</style>
</head>
<body>

<div id="flash"></div>

<!-- ═══════════════════ SETUP SCREEN ═══════════════════ -->
<div id="setup-screen" class="screen">
  <div class="title-svg-wrap">
    <svg viewBox="0 0 600 130" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-c"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glow-m"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#00FFFF"/>
          <stop offset="50%" stop-color="#FF00FF"/>
          <stop offset="100%" stop-color="#00FFFF">
            <animate attributeName="offset" values="1;0;1" dur="4s" repeatCount="indefinite"/>
          </stop>
        </linearGradient>
      </defs>
      <line x1="0" y1="125" x2="600" y2="125" stroke="#00FFFF" stroke-width=".5" opacity=".4"/>
      <line x1="0" y1="5"   x2="600" y2="5"   stroke="#00FFFF" stroke-width=".5" opacity=".4"/>
      <text x="300" y="78" text-anchor="middle" font-family="'Orbitron',monospace" font-size="68" font-weight="900" fill="url(#title-grad)" filter="url(#glow-m)" letter-spacing="6">ARCADE</text>
      <text x="300" y="118" text-anchor="middle" font-family="'Orbitron',monospace" font-size="22" font-weight="700" fill="#FF00FF" filter="url(#glow-c)" letter-spacing="18" opacity=".9">OVERDRIVE</text>
      <g stroke="#00FFFF" stroke-width="2" fill="none" opacity=".6">
        <path d="M8,8 L8,22 M8,8 L22,8"/><path d="M592,8 L592,22 M592,8 L578,8"/>
        <path d="M8,122 L8,108 M8,122 L22,122"/><path d="M592,122 L592,108 M592,122 L578,122"/>
      </g>
      <rect x="0" y="0" width="600" height="3" fill="#FF00FF" opacity=".25">
        <animate attributeName="y" values="0;130;0" dur="3s" repeatCount="indefinite"/>
      </rect>
    </svg>
  </div>

  <div class="setup-actions">
    <input type="file" id="file-input" accept=".json" style="display:none" multiple onchange="handleUpload(event)">
    <div class="btn" onclick="document.getElementById('file-input').click()" style="color:var(--magenta)">
      <svg viewBox="0 0 400 54" xmlns="http://www.w3.org/2000/svg">
        <rect class="btn-rect" x="2" y="2" width="396" height="50" rx="3" fill="rgba(255,0,255,0.06)" stroke="currentColor" stroke-width="2"/>
        <line x1="2" y1="2" x2="12" y2="2" stroke="currentColor" stroke-width="3"/>
        <line x1="2" y1="2" x2="2" y2="12" stroke="currentColor" stroke-width="3"/>
        <line x1="398" y1="52" x2="388" y2="52" stroke="currentColor" stroke-width="3"/>
        <line x1="398" y1="52" x2="398" y2="42" stroke="currentColor" stroke-width="3"/>
      </svg>
      <div class="btn-text" style="color:var(--magenta)">[ UPLOAD DATABANK ]</div>
    </div>
    <div id="banks-list"></div>
    <div class="btn" onclick="useDefault()">
      <svg viewBox="0 0 400 54" xmlns="http://www.w3.org/2000/svg">
        <rect class="btn-rect" x="2" y="2" width="396" height="50" rx="3" fill="rgba(0,255,255,0.05)" stroke="currentColor" stroke-width="2"/>
        <line x1="2" y1="2" x2="12" y2="2" stroke="currentColor" stroke-width="3"/>
        <line x1="2" y1="2" x2="2" y2="12" stroke="currentColor" stroke-width="3"/>
        <line x1="398" y1="52" x2="388" y2="52" stroke="currentColor" stroke-width="3"/>
        <line x1="398" y1="52" x2="398" y2="42" stroke="currentColor" stroke-width="3"/>
      </svg>
      <div class="btn-text">&gt;&gt; INITIALIZE CORE &lt;&lt;</div>
    </div>
  </div>
</div>

<!-- ═══════════════════ LEVEL SELECT SCREEN ═══════════════════ -->
<div id="levelselect-screen" class="screen hidden">
  <svg viewBox="0 0 600 70" style="width:min(600px,95vw)" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="lsel-glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <text x="300" y="44" text-anchor="middle" font-family="'Orbitron',monospace" font-size="34" font-weight="900" fill="#00FFFF" filter="url(#lsel-glow)" letter-spacing="5">SELECT SECTOR</text>
    <g stroke="#00FFFF" stroke-width="2" fill="none" opacity=".6">
      <path d="M8,8 L8,20 M8,8 L20,8"/><path d="M592,8 L592,20 M592,8 L580,8"/>
      <path d="M8,62 L8,50 M8,62 L20,62"/><path d="M592,62 L592,50 M592,62 L580,62"/>
    </g>
  </svg>
  <div id="ls-bank-name"></div>
  <div id="ls-grid"></div>
  <div id="ls-back-wrap" class="btn" onclick="backToMenu()" style="color:rgba(0,255,255,0.5)">
    <svg viewBox="0 0 320 46" xmlns="http://www.w3.org/2000/svg">
      <rect class="btn-rect" x="2" y="2" width="316" height="42" rx="3" fill="rgba(0,255,255,0.04)" stroke="currentColor" stroke-width="1.5"/>
    </svg>
    <div class="btn-text" style="color:rgba(0,255,255,0.55);font-size:.65rem">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      <span>BACK TO DATABANKS</span>
    </div>
  </div>
</div>

<!-- ═══════════════════ GAME SCREEN ═══════════════════ -->
<div id="game-screen">

  <svg id="bg-svg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="bg-grad" cx="50%" cy="40%" r="55%">
        <stop offset="0%" stop-color="#0A0A1A"/>
        <stop offset="100%" stop-color="#02020A"/>
      </radialGradient>
      <pattern id="hex-grid" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
        <path d="M30,1 L59,17 L59,35 L30,51 L1,35 L1,17 Z" fill="none" stroke="rgba(0,255,255,0.06)" stroke-width="1"/>
      </pattern>
      <linearGradient id="floor-grad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="transparent"/>
        <stop offset="100%" stop-color="rgba(0,255,255,0.25)"/>
      </linearGradient>
      <filter id="glow2"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <rect width="1000" height="700" fill="url(#bg-grad)"/>
    <rect width="1000" height="700" fill="url(#hex-grid)"/>
    <g transform="translate(500,700) rotate(-90) scale(1)">
      <g stroke="rgba(0,255,255,0.18)" stroke-width="1" fill="none">
        <line x1="-500" y1="30" x2="500" y2="30"/>
        <line x1="-500" y1="90" x2="500" y2="90"/>
        <line x1="-500" y1="170" x2="500" y2="170"/>
        <line x1="-500" y1="270" x2="500" y2="270"/>
        <line x1="-500" y1="400" x2="500" y2="400"/>
      </g>
      <g stroke="rgba(255,0,255,0.12)" stroke-width="1" fill="none">
        <line x1="0" y1="0" x2="-80" y2="400"/>
        <line x1="0" y1="0" x2="-200" y2="400"/>
        <line x1="0" y1="0" x2="-350" y2="400"/>
        <line x1="0" y1="0" x2="80" y2="400"/>
        <line x1="0" y1="0" x2="200" y2="400"/>
        <line x1="0" y1="0" x2="350" y2="400"/>
      </g>
    </g>
    <g stroke="rgba(0,255,255,0.2)" stroke-width="1.5" fill="none">
      <path d="M0,200 L60,200 L60,160 L120,160 L120,200 L180,200"/>
      <circle cx="60" cy="200" r="3" fill="rgba(0,255,255,0.4)"/>

<script>
// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const QUESTIONS_PER_LEVEL = 40;
const LIVES_MAX  = 3;
const LS_PREFIX  = 'arcade_bank_';

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let questions       = [];   // full question bank
let currentLevel    = 1;    // 1-based
let totalLevels     = 1;
let levelQuestions  = [];   // slice for current level
let levelIdx        = 0;    // index within levelQuestions
let score           = 0;
let lives           = LIVES_MAX;
let isShooting      = false;
let checkpointIdx   = null; // within-level index
let checkpointSaved = false;
let extraLifeGiven  = false;
let hasRevive       = false;
let currentBankKey  = null;
let introTimer      = null;
let levelStartScore = 0;     // score baseline at the start of the current level attempt
let progress         = null; // persisted progress for the current bank {maxLevelUnlocked, checkpoint, bestScore}
let pendingLevel      = null; // level awaiting a continue/restart decision
let armedOptionIdx   = null; // index of the currently "locked on" target (first-tap-armed)
const LS_PROGRESS_PREFIX = 'arcade_progress_';

// ─────────────────────────────────────────────
//  AUDIO ENGINE
// ─────────────────────────────────────────────
let audioCtx     = null;
let masterGain   = null;
let musicGain    = null;
let sfxGain      = null;
let isMuted      = false;
let volume       = 0.7;
let musicRunning = false;
let musicSched   = null;
let nextBarTime  = 0;
let barCount     = 0;

function initAudio() {
  if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  musicGain  = audioCtx.createGain();
  sfxGain    = audioCtx.createGain();
  musicGain.connect(masterGain);
  sfxGain.connect(masterGain);
  masterGain.connect(audioCtx.destination);
  masterGain.gain.value = isMuted ? 0 : volume;
  musicGain.gain.value  = 0.52;
  sfxGain.gain.value    = 1.0;
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

const PENTA      = [110,130.81,146.83,164.81,196,220,261.63,293.66,329.63,392];
const BASS_NOTES = [55,65.41,73.42,82.41,98,110];
const BPM  = 128, BEAT = 60/BPM, BAR = BEAT*4;

function startMusic() {
  if (musicRunning || !audioCtx) return;
  musicRunning = true; nextBarTime = audioCtx.currentTime+0.05; barCount = 0;
  scheduleMusic();
}
function stopMusic() {
  musicRunning = false;
  if (musicSched) { clearTimeout(musicSched); musicSched = null; }
}
function scheduleMusic() {
  if (!musicRunning) return;
  while (nextBarTime < audioCtx.currentTime + BAR*2) {
    scheduleBar(nextBarTime, barCount); nextBarTime += BAR; barCount++;
  }
  musicSched = setTimeout(scheduleMusic, BAR*1000*0.5);
}
function scheduleBar(t, bar) {
  scheduleDrums(t); scheduleBass(t, bar);
  if (bar%2===0) schedulePad(t,bar);
  if (bar%4===2) scheduleArp(t);
}
function scheduleDrums(t) {
  [0,2].forEach(b=>scheduleKick(t+b*BEAT));
  [1,3].forEach(b=>scheduleSnare(t+b*BEAT));
  for(let i=0;i<8;i++) scheduleHihat(t+i*BEAT*0.5,i%2===0?0.16:0.07);
}
function scheduleKick(t) {
  const len=audioCtx.sampleRate*0.25, buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++){const env=Math.exp(-i/(audioCtx.sampleRate*0.08)),freq=55*Math.exp(-i/(audioCtx.sampleRate*0.04));d[i]=Math.sin(2*Math.PI*freq*i/audioCtx.sampleRate)*env;}
  const src=audioCtx.createBufferSource();src.buffer=buf;const g=audioCtx.createGain();g.gain.value=1.1;src.connect(g);g.connect(musicGain);src.start(t);
}
function scheduleSnare(t) {
  const len=audioCtx.sampleRate*0.18,buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.05));
  const src=audioCtx.createBufferSource();src.buffer=buf;
  const hpf=audioCtx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=1500;
  const g=audioCtx.createGain();g.gain.value=0.5;src.connect(hpf);hpf.connect(g);g.connect(musicGain);src.start(t);
  const osc=audioCtx.createOscillator();osc.type='triangle';osc.frequency.setValueAtTime(220,t);osc.frequency.exponentialRampToValueAtTime(80,t+0.1);
  const g2=audioCtx.createGain();g2.gain.setValueAtTime(0.28,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  osc.connect(g2);g2.connect(musicGain);osc.start(t);osc.stop(t+0.15);
}
function scheduleHihat(t,vol) {
  const len=audioCtx.sampleRate*0.05,buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.012));
  const src=audioCtx.createBufferSource();src.buffer=buf;
  const hpf=audioCtx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=8000;
  const g=audioCtx.createGain();g.gain.value=vol;src.connect(hpf);hpf.connect(g);g.connect(musicGain);src.start(t);
}
const BASS_PAT=[0,0,3,0,1,1,4,1,2,2,0,2,1,1,3,1];
function scheduleBass(t,bar) {
  for(let s=0;s<16;s++){const st=t+s*BEAT*0.25,note=BASS_NOTES[BASS_PAT[(bar*16+s)%BASS_PAT.length]],dur=BEAT*0.22;
    const osc=audioCtx.createOscillator();osc.type='sawtooth';osc.frequency.value=note;
    const lpf=audioCtx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.setValueAtTime(800,st);lpf.frequency.exponentialRampToValueAtTime(200,st+dur);
    const g=audioCtx.createGain();g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(0.32,st+0.01);g.gain.exponentialRampToValueAtTime(0.001,st+dur);
    osc.connect(lpf);lpf.connect(g);g.connect(musicGain);osc.start(st);osc.stop(st+dur);}
}
const PAD_CHORDS=[[220,261.63,329.63],[174.61,220,261.63],[130.81,164.81,196],[196,246.94,293.66]];
function schedulePad(t,bar) {
  const chord=PAD_CHORDS[(Math.floor(bar/2))%PAD_CHORDS.length];
  chord.forEach(freq=>{
    const osc=audioCtx.createOscillator();osc.type='sawtooth';osc.frequency.value=freq;
    const osc2=audioCtx.createOscillator();osc2.type='sine';osc2.frequency.value=freq*2.008;
    const lpf=audioCtx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=1200;
    const dly=audioCtx.createDelay();dly.delayTime.value=0.025;
    const g=audioCtx.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.05,t+BAR*0.3);g.gain.setValueAtTime(0.05,t+BAR*1.7);g.gain.linearRampToValueAtTime(0,t+BAR*2);
    osc.connect(lpf);osc2.connect(dly);dly.connect(lpf);lpf.connect(g);g.connect(musicGain);osc.start(t);osc2.start(t);osc.stop(t+BAR*2);osc2.stop(t+BAR*2);
  });
}
const ARP_PAT=[0,2,4,6,5,3,1,0,2,4,7,5,4,2,0,3];
function scheduleArp(t) {
  for(let s=0;s<16;s++){const st=t+s*BEAT*0.25,note=PENTA[ARP_PAT[s]%PENTA.length]*2,dur=BEAT*0.18;
    const osc=audioCtx.createOscillator();osc.type='square';osc.frequency.value=note;
    const g=audioCtx.createGain();g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(0.08,st+0.01);g.gain.exponentialRampToValueAtTime(0.001,st+dur);
    osc.connect(g);g.connect(musicGain);osc.start(st);osc.stop(st+dur);}
}

function playSound(type) {
  if (!audioCtx||!sfxGain) return;
  const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
  osc.connect(gain);gain.connect(sfxGain);
  const t=audioCtx.currentTime;
  if(type==='shoot'){osc.type='sawtooth';osc.frequency.setValueAtTime(900,t);osc.frequency.exponentialRampToValueAtTime(80,t+.35);gain.gain.setValueAtTime(.28,t);gain.gain.exponentialRampToValueAtTime(.01,t+.35);osc.start(t);osc.stop(t+.35);}
  else if(type==='lock'){osc.type='square';osc.frequency.setValueAtTime(700,t);osc.frequency.setValueAtTime(1000,t+.06);gain.gain.setValueAtTime(.18,t);gain.gain.exponentialRampToValueAtTime(.01,t+.12);osc.start(t);osc.stop(t+.12);}
  else if(type==='hit'){osc.type='square';osc.frequency.setValueAtTime(160,t);osc.frequency.exponentialRampToValueAtTime(40,t+.5);gain.gain.setValueAtTime(.4,t);gain.gain.exponentialRampToValueAtTime(.01,t+.5);osc.start(t);osc.stop(t+.5);}
  else if(type==='miss'){osc.type='sawtooth';osc.frequency.setValueAtTime(120,t);osc.frequency.linearRampToValueAtTime(40,t+.5);gain.gain.setValueAtTime(.4,t);gain.gain.linearRampToValueAtTime(.01,t+.5);osc.start(t);osc.stop(t+.5);}
  else if(type==='powerup'){osc.type='sine';osc.frequency.setValueAtTime(400,t);osc.frequency.linearRampToValueAtTime(800,t+.3);gain.gain.setValueAtTime(.3,t);gain.gain.exponentialRampToValueAtTime(.01,t+.5);osc.start(t);osc.stop(t+.5);}
  else if(type==='checkpoint'){osc.type='triangle';osc.frequency.setValueAtTime(300,t);osc.frequency.linearRampToValueAtTime(600,t+.2);osc.frequency.linearRampToValueAtTime(450,t+.4);gain.gain.setValueAtTime(.25,t);gain.gain.exponentialRampToValueAtTime(.01,t+.4);osc.start(t);osc.stop(t+.4);}
  else if(type==='levelup'){
    // Triumphant jingle for level complete
    const notes=[523,659,784,1047];
    notes.forEach((freq,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='square';o.connect(g);g.connect(sfxGain);
      const st=t+i*0.12;
      o.frequency.value=freq;
      g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(0.18,st+0.02);g.gain.exponentialRampToValueAtTime(0.001,st+0.25);
      o.start(st);o.stop(st+0.25);
    });
  }
}

function defaultProgress(){
  return { maxLevelUnlocked: 1, checkpoint: null, bestScore: 0 };
}
function getProgress(bankKey){
  try{
    const raw=localStorage.getItem(LS_PROGRESS_PREFIX+bankKey);
    if(!raw) return defaultProgress();
    const parsed=JSON.parse(raw);
    return Object.assign(defaultProgress(), parsed);
  }catch(e){ return defaultProgress(); }
}
function saveProgress(){
  if(!currentBankKey||!progress) return;
  try{ localStorage.setItem(LS_PROGRESS_PREFIX+currentBankKey, JSON.stringify(progress)); }catch(e){}
}
function clearProgress(bankKey){
  localStorage.removeItem(LS_PROGRESS_PREFIX+bankKey);
}

// ─────────────────────────────────────────────
function saveBank(name, data) {
  localStorage.setItem(LS_PREFIX+name, JSON.stringify({name,data,savedAt:Date.now()}));
  renderBanksList();
}
function loadBanks() {
  const banks=[];
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith(LS_PREFIX)){try{banks.push(JSON.parse(localStorage.getItem(k)));}catch(e){}}}
  return banks;
}
function deleteBank(name){localStorage.removeItem(LS_PREFIX+name);renderBanksList();}
function renderBanksList() {
  const list=document.getElementById('banks-list');
  const banks=loadBanks();
  list.innerHTML='';
  if(!banks.length) return;
  const hdr=document.createElementNS('http://www.w3.org/2000/svg','svg');
  hdr.setAttribute('viewBox','0 0 400 20');hdr.style.width='100%';
  hdr.innerHTML=`<text x="0" y="14" font-family="'Share Tech Mono',monospace" font-size="11" fill="rgba(0,255,255,0.45)" letter-spacing="3">─── SAVED DATABANKS ───</text>`;
  list.appendChild(hdr);
  banks.sort((a,b)=>b.savedAt-a.savedAt).forEach(bank=>{
    const lvls=Math.ceil(bank.data.length/QUESTIONS_PER_LEVEL);
    const wrap=document.createElement('div');wrap.className='bank-entry';
    const btn=document.createElement('div');btn.className='btn';btn.style.color='var(--green)';
    btn.onclick=()=>{questions=bank.data;currentBankKey=bank.name;initAudio();openLevelSelect();};
    btn.innerHTML=`<svg viewBox="0 0 320 46" xmlns="http://www.w3.org/2000/svg"><rect class="btn-rect" x="1" y="1" width="318" height="44" rx="3" fill="rgba(0,255,136,0.05)" stroke="currentColor" stroke-width="1.5"/></svg>
      <div class="btn-text" style="color:var(--green);font-size:.7rem;letter-spacing:2px">${bank.name.substring(0,22)} <span style="opacity:.5">[${bank.data.length}Q · ${lvls}LVL]</span></div>`;
    const del=document.createElement('button');del.className='bank-del';del.textContent='✕';
    del.onclick=(e)=>{e.stopPropagation();if(confirm(`Delete "${bank.name}"?`)){deleteBank(bank.name);clearProgress(bank.name);}};
    wrap.appendChild(btn);wrap.appendChild(del);list.appendChild(wrap);
  });
}

// ─────────────────────────────────────────────
//  UPLOAD
// ─────────────────────────────────────────────
function handleUpload(e) {
  const files=Array.from(e.target.files);if(!files.length) return;
  let processed=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        const name=file.name.replace(/\.json$/i,'');
        saveBank(name,parsed);processed++;
        if(processed===files.length){questions=parsed;currentBankKey=name;initAudio();openLevelSelect();}
      }catch(err){alert('ERR: CORRUPT DATA — '+file.name);}
    };
    reader.readAsText(file);
  });
  e.target.value='';
}

function openLevelSelect(){
  if(!questions.length) return;
  progress     = getProgress(currentBankKey);
  totalLevels  = Math.ceil(questions.length/QUESTIONS_PER_LEVEL);
  renderLevelSelect();
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('levelselect-screen').classList.remove('hidden');
  document.getElementById('game-screen').classList.remove('active');
  ['gameover-panel','victory-panel','levelcomplete-panel','checkpoint-panel','extralife-panel','checkpoint-choice-panel'].forEach(id=>{
    document.getElementById(id).classList.add('hidden');
  });
}

function renderLevelSelect(){
  document.getElementById('ls-bank-name').textContent = `DATABANK: ${currentBankKey} · ${questions.length} TARGETS · ${totalLevels} SECTOR${totalLevels===1?'':'S'}`;
  const grid=document.getElementById('ls-grid');
  grid.innerHTML='';
  for(let lv=1; lv<=totalLevels; lv++){
    const locked    = lv>progress.maxLevelUnlocked;
    const cleared    = lv<progress.maxLevelUnlocked;
    const hasCheckpoint = !!(progress.checkpoint && progress.checkpoint.level===lv);
    const tile=document.createElement('div');
    tile.className='ls-tile'+(locked?' locked':'');
    tile.innerHTML=buildLevelTileSVG(lv, locked, cleared, hasCheckpoint);
    if(!locked) tile.onclick=()=>selectLevel(lv, hasCheckpoint);
    grid.appendChild(tile);
  }
}

function buildLevelTileSVG(lv, locked, cleared, hasCheckpoint){
  const strokeColor = locked? 'rgba(0,255,255,0.18)' : (cleared? '#00FF88' : '#00FFFF');
  const fillColor   = locked? 'rgba(0,0,0,0.4)' : (cleared? 'rgba(0,255,136,0.07)' : 'rgba(0,255,255,0.05)');
  const numColor    = locked? 'rgba(0,255,255,0.25)' : (cleared? '#00FF88' : '#00FFFF');
  let badge='';
  if(locked){
    // padlock icon
    badge=`<g transform="translate(50,50)" stroke="rgba(0,255,255,0.4)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-14" y="-2" width="28" height="22" rx="3"/>
      <path d="M-9,-2 V-12 a9,9 0 0 1 18,0 V-2"/>
    </g>`;
  } else if(cleared){
    // checkmark badge top-right
    badge=`<g transform="translate(78,22)">
      <circle r="13" fill="#00FF88" opacity=".9"/>
      <path d="M-6,0 L-1,5 L7,-6" stroke="#02020A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>`;
  }
  let cpBadge='';
  if(hasCheckpoint){
    cpBadge=`<g transform="translate(22,22)">
      <circle r="12" fill="#FFB300" opacity=".95"/>
      <polygon points="0,-6 6,-2 6,7 0,4 -6,7 -6,-2" fill="#02020A"/>
    </g>`;
  }
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs><filter id="ls-glow-${lv}"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <rect x="6" y="6" width="88" height="88" rx="6" fill="${fillColor}" stroke="${strokeColor}" stroke-width="2"${locked?'':' filter="url(#ls-glow-'+lv+')"'}/>
    <g stroke="${strokeColor}" stroke-width="1.5" fill="none" opacity=".7">
      <path d="M12,12 L12,22 M12,12 L22,12"/><path d="M88,12 L88,22 M88,12 L78,12"/>
      <path d="M12,88 L12,78 M12,88 L22,88"/><path d="M88,88 L88,78 M88,88 L78,88"/>
    </g>
    ${locked? badge : `<text x="50" y="62" text-anchor="middle" font-family="'Orbitron',monospace" font-size="30" font-weight="900" fill="${numColor}">${lv}</text>`}
    ${badge && !locked? badge: ''}

  </svg>`;
}

function selectLevel(lv, hasCheckpoint){
  pendingLevel=lv;
  initAudio();
  if(hasCheckpoint){
    showCheckpointChoice(lv);
  } else {
    beginLevelFresh(lv);
  }
}

function showCheckpointChoice(lv){
  document.getElementById('cc-level-txt').textContent=`LEVEL ${lv}`;
  document.getElementById('cc-checkpoint-txt').textContent=`SAVED AT TARGET ${progress.checkpoint.idx+1}`;
  document.getElementById('checkpoint-choice-panel').classList.remove('hidden');
}
function ccContinue(){
  document.getElementById('checkpoint-choice-panel').classList.add('hidden');
  resumeFromCheckpointSelected(pendingLevel);
}
function ccRestart(){
  document.getElementById('checkpoint-choice-panel').classList.add('hidden');
  beginLevelFresh(pendingLevel);
}
function ccCancel(){
  document.getElementById('checkpoint-choice-panel').classList.add('hidden');
  pendingLevel=null;
}

function beginLevelFresh(lv){
  currentLevel = lv;
  score        = 0;
  lives        = LIVES_MAX;

  document.getElementById('levelselect-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.add('active');
  document.getElementById('gameover-panel').classList.add('hidden');
  document.getElementById('victory-panel').classList.add('hidden');
  document.getElementById('levelcomplete-panel').classList.add('hidden');

  showLevelIntro(lv, actuallyStartLevel);
  if(!musicRunning){startMusic();}
}

function resumeFromCheckpointSelected(lv){
  const cp = progress.checkpoint;
  currentLevel    = lv;
  levelQuestions  = getLevelQuestions(lv);
  levelIdx        = cp.idx;
  score           = cp.score;
  levelStartScore = cp.score;
  lives           = LIVES_MAX;
  checkpointIdx   = cp.idx;
  checkpointSaved = true;
  extraLifeGiven  = (levelQuestions.length>0) && (cp.idx/levelQuestions.length)>=0.5;
  hasRevive       = false;
  isShooting      = false;
  armedOptionIdx  = null;

  document.getElementById('levelselect-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.add('active');
  document.getElementById('gameover-panel').classList.add('hidden');

  updateHUD();
  loadQuestion();
  if(!musicRunning){startMusic();}
}

function actuallyStartLevel() {
  levelQuestions  = getLevelQuestions(currentLevel);
  levelIdx        = 0;
  isShooting      = false;
  levelStartScore = score;
  armedOptionIdx  = null;
  // restore an existing persisted checkpoint reference for this level (doesn't move the player,
  // just keeps the "continue from checkpoint" fallback available if they die again)
  if(progress && progress.checkpoint && progress.checkpoint.level===currentLevel){
    checkpointIdx   = progress.checkpoint.idx;
    checkpointSaved = true;
  } else {
    checkpointIdx   = null;
    checkpointSaved = false;
  }
  extraLifeGiven  = false;
  updateHUD();
  loadQuestion();
}

function startNextLevel() {
  // Shield bonus: restore 1 life for clearing the level
  if(lives<LIVES_MAX){lives=Math.min(LIVES_MAX,lives+1);}
  currentLevel++;
  document.getElementById('levelcomplete-panel').classList.add('hidden');
  showLevelIntro(currentLevel, actuallyStartLevel);
}

function updateHUD() {
  document.getElementById('hud-score').textContent=score.toString().padStart(4,'0');
  document.getElementById('hud-level').textContent=`LEVEL ${currentLevel} / ${totalLevels}`;
  document.getElementById('hud-q').textContent=`Q ${levelIdx+1} / ${levelQuestions.length}`;

  // mini progress bar in HUD SVG
  const pct = levelQuestions.length>0 ? (levelIdx/levelQuestions.length) : 0;
  const bar = document.getElementById('hud-lvl-bar');
  if(bar) bar.setAttribute('width', String(Math.round(pct*300)));

  // bottom progress bar
  const fill=document.getElementById('level-progress-fill');
  if(fill) fill.style.width=(pct*100)+'%';

  // lives hearts
  const g=document.getElementById('hud-lives-group');
  g.innerHTML='';
  for(let i=0;i<LIVES_MAX;i++){
    const active=i<lives;const x=i*50;
    const cx=x+25,cy=-10;
    const heart=document.createElementNS('http://www.w3.org/2000/svg','path');
    heart.setAttribute('d',`M${cx},${cy+14} C${cx},${cy+14} ${cx-14},${cy+4} ${cx-14},${cy-4} C${cx-14},${cy-11} ${cx-7},${cy-17} ${cx},${cy-10} C${cx+7},${cy-17} ${cx+14},${cy-11} ${cx+14},${cy-4} C${cx+14},${cy+4} ${cx},${cy+14} ${cx},${cy+14} Z`);
    heart.setAttribute('fill',active?'#00FF88':'rgba(0,255,136,0.12)');
    heart.setAttribute('stroke',active?'#00FF88':'rgba(0,255,136,0.3)');
    heart.setAttribute('stroke-width','1.5');
    if(active) heart.setAttribute('filter','url(#hud-glow)');
    g.appendChild(heart);
  }
}

function checkMilestones() {
  const pct=levelIdx/levelQuestions.length;
  if(!checkpointSaved&&pct>=0.30){
    checkpointSaved=true;checkpointIdx=levelIdx;
    if(progress){
      progress.checkpoint = { level: currentLevel, idx: levelIdx, score: score };
      saveProgress();
    }
    playSound('checkpoint');
    document.getElementById('checkpoint-panel').classList.remove('hidden');
  }
  if(!extraLifeGiven&&pct>=0.50){
    extraLifeGiven=true;hasRevive=true;
    if(lives<LIVES_MAX) lives=Math.min(LIVES_MAX,lives+1);
    playSound('powerup');
    setTimeout(()=>{document.getElementById('extralife-panel').classList.remove('hidden');},
      checkpointSaved?200:0);
    updateHUD();
  }
}

function dismissPanel(id){document.getElementById(id).classList.add('hidden');}

        <path d="M10,10 L10,18 M10,10 L18,10"/><path d="M90,10 L90,18 M90,10 L82,10"/>
        <path d="M10,90 L10,82 M10,90 L18,90"/><path d="M90,90 L90,82 M90,90 L82,90"/>

      <circle class="ring" cx="50" cy="50" r="30" stroke-dasharray="6 4">

      </circle>
      <line x1="50" y1="22" x2="50" y2="36" stroke="#00FFFF" stroke-width="1" opacity=".5"/>
      <line x1="50" y1="64" x2="50" y2="78" stroke="#00FFFF" stroke-width="1" opacity=".5"/>
      <line x1="22" y1="50" x2="36" y2="50" stroke="#00FFFF" stroke-width="1" opacity=".5"/>
      <line x1="64" y1="50" x2="78" y2="50" stroke="#00FFFF" stroke-width="1" opacity=".5"/>

function handleOptionTap(wrap, idx, isCorrect){
  if(isShooting) return;
  const area=document.getElementById('options-area');
  if(armedOptionIdx===idx){
    // second tap on the same target — FIRE
    armedOptionIdx=null;
    shoot(wrap,isCorrect);
  } else {
    // first tap (or a different target) — LOCK ON, show full text, don't fire yet
    armedOptionIdx=idx;
    Array.from(area.children).forEach(c=>c.classList.remove('armed'));
    wrap.classList.add('armed');
    initAudio();playSound('lock');
    if(navigator.vibrate){ try{ navigator.vibrate(15); }catch(e){} }
  }
}

function buildLabelHTML(text,idx){
  const colors=['#00FFFF','#FF00FF','#FFB300','#00FF88'];
  const c=colors[idx%4];
  const div=document.createElement('div');
  div.className='opt-label-html';
  div.style.color='white';div.style.border=`1.5px solid ${c}`;
  div.textContent=text;
  return div;
}

function setQText(txt){
  const el=document.getElementById('q-text');el.textContent=txt;
  const box=document.getElementById('q-box');if(box) box.scrollTop=0;
}

// ─────────────────────────────────────────────
//  SHOOT
// ─────────────────────────────────────────────
function shoot(targetEl,isCorrect){
  if(isShooting) return;
  isShooting=true;initAudio();playSound('shoot');
  const bg=document.getElementById('bomb-g');
  const launcher=document.getElementById('launcher-svg');
  const lRect=launcher.getBoundingClientRect();
  const tRect=targetEl.getBoundingClientRect();
  const fromX=lRect.left+lRect.width/2;
  const fromY=lRect.top+38*(lRect.height/launcher.viewBox.baseVal.height);
  const dx=tRect.left+tRect.width/2-fromX;
  const dy=tRect.top+tRect.height/2-fromY;
  const scale=lRect.width/launcher.viewBox.baseVal.width;
  bg.style.transition='transform 0.3s cubic-bezier(0.5,0,1,1), opacity 0.1s';
  bg.style.transform=`translate(${dx/scale}px,${dy/scale}px) scale(0.4)`;
  setTimeout(()=>{
    bg.style.opacity='0';
    const color=isCorrect?'#00FF88':'#FF003C';
    createExplosion(tRect.left+tRect.width/2, tRect.top+tRect.height/2, color);
    const feedbackbox="BRILLA👨‍🎓-BOSSU🙌-SHARK🦈-TYPESHIT😎".split("-");
    spawnCombatText(tRect.left+tRect.width/2-60, tRect.top+tRect.height/2-20,
      isCorrect?feedbackbox[Math.floor(Math.random()*feedbackbox.length)]:'Naa ❌', color);
    if(isCorrect){
      playSound('hit');triggerFlash();
      score+=1000;targetEl.style.visibility='hidden';
      setQText('▸ TARGET OBLITERATED');
      document.getElementById('next-btn-wrap').style.display='block';
    }else{
      playSound('miss');lives=Math.max(0,lives-1);
      document.getElementById('game-screen').classList.add('shaking');
      setTimeout(()=>document.getElementById('game-screen').classList.remove('shaking'),460);
      if(lives<=0){setTimeout(showGameOver,600);}
      else{setQText('⚠ INTEGRITY COMPROMISED — SHIELDS: '+lives+' REMAINING');setTimeout(loadQuestion,1800);}
    }
    updateHUD();
  },310);
}

function nextQuestion(){levelIdx++;loadQuestion();}

function showLevelComplete() {
  playSound('levelup');
  triggerFlash();
  document.getElementById('lc-level-txt').textContent=`LEVEL ${currentLevel} COMPLETE`;
  document.getElementById('lc-score').textContent=`SCORE: ${score.toString().padStart(4,'0')}`;

  // Bonus message
  let bonus='';
  if(lives===LIVES_MAX) bonus='PERFECT SHIELDS — BONUS +500 PTS';
  else if(lives>0) bonus='SHIELDS BONUS — +250 PTS';
  if(bonus){score+=lives===LIVES_MAX?500:250;}
  document.getElementById('lc-bonus').textContent=bonus;

  const nextLv=currentLevel+1;
  const nextQ=getLevelQuestions(nextLv).length;
  document.getElementById('lc-next-preview').textContent=`▸ LEVEL ${nextLv}: ${nextQ} TARGETS AWAIT`;

  if(progress){
    progress.maxLevelUnlocked = Math.max(progress.maxLevelUnlocked, currentLevel+1);
    if(progress.checkpoint && progress.checkpoint.level===currentLevel) progress.checkpoint=null;
    progress.bestScore = Math.max(progress.bestScore||0, score);
    saveProgress();
  }

  document.getElementById('levelcomplete-panel').classList.remove('hidden');
}

function showVictory(){
  playSound('levelup');triggerFlash();
  document.getElementById('v-levels').textContent=`ALL ${totalLevels} LEVEL${totalLevels===1?'':'S'} CLEARED`;
  document.getElementById('v-score').textContent='SCORE: '+score.toString().padStart(4,'0');
  if(progress){
    progress.maxLevelUnlocked = Math.max(progress.maxLevelUnlocked, totalLevels+1);
    progress.checkpoint = null;
    progress.bestScore = Math.max(progress.bestScore||0, score);
    saveProgress();
  }
  document.getElementById('victory-panel').classList.remove('hidden');
}

function showGameOver(){
  document.getElementById('go-level').textContent=`LEVEL ${currentLevel} · Q ${levelIdx+1}/${levelQuestions.length}`;
  document.getElementById('go-score').textContent='FINAL SCORE: '+score.toString().padStart(4,'0');
  document.getElementById('go-checkpoint').textContent=checkpointIdx!==null?`CHECKPOINT AT Q${checkpointIdx+1} AVAILABLE`:'NO CHECKPOINT REACHED — RESTART ONLY';
  document.getElementById('go-revive').textContent=hasRevive?'◆ EXTRA LIFE REVIVE READY':'';
  document.getElementById('revive-btn-wrap').style.display=hasRevive?'block':'none';
  document.getElementById('checkpoint-resume-btn').style.display=checkpointIdx!==null?'block':'none';
  document.getElementById('gameover-panel').classList.remove('hidden');
}

function revive(){
  if(!hasRevive) return;
  hasRevive=false;lives=LIVES_MAX;
  document.getElementById('gameover-panel').classList.add('hidden');
  armedOptionIdx=null;
  updateHUD();loadQuestion();
}

function resumeCheckpoint(){
  if(checkpointIdx===null) return;
  levelIdx=checkpointIdx;lives=LIVES_MAX;
  score=Math.max(0,(progress&&progress.checkpoint&&progress.checkpoint.level===currentLevel)?progress.checkpoint.score:score);
  document.getElementById('gameover-panel').classList.add('hidden');
  armedOptionIdx=null;
  updateHUD();loadQuestion();
}

function restartLevel(){
  levelIdx        = 0;
  lives           = LIVES_MAX;
  score           = levelStartScore;
  isShooting      = false;
  armedOptionIdx  = null;
  document.getElementById('gameover-panel').classList.add('hidden');
  updateHUD();loadQuestion();
}

function goToLevelSelectFromGame(){
  document.getElementById('gameover-panel').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('active');
  openLevelSelect();
}

function backToMenu(){
  ['gameover-panel','victory-panel','levelcomplete-panel','checkpoint-panel','extralife-panel','checkpoint-choice-panel'].forEach(id=>{
    document.getElementById(id).classList.add('hidden');
  });
  document.getElementById('game-screen').classList.remove('active');
  document.getElementById('levelselect-screen').classList.add('hidden');
  document.getElementById('setup-screen').classList.remove('hidden');
  renderBanksList();
}

// ─────────────────────────────────────────────
//  VFX
// ─────────────────────────────────────────────
function triggerFlash(){const f=document.getElementById('flash');f.classList.remove('flashing');void f.offsetWidth;f.classList.add('flashing');}

function spawnCombatText(x,y,text,color){
  const el=document.createElement('div');el.className='combat-float';
  el.style.left=x+'px';el.style.top=y+'px';el.style.color=color;el.textContent=text;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1200);
}

function createExplosion(cx,cy,color){
  for(let i=0;i<18;i++){
    const p=document.createElement('div');const size=Math.random()*14+5;
    p.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${i%3===0?'#fff':color};border-radius:50%;box-shadow:0 0 ${size*2}px ${color};pointer-events:none;z-index:999;`;
    document.body.appendChild(p);
    const angle=(Math.PI*2/18)*i,dist=80+Math.random()*130;
    p.animate([{transform:'translate(0,0) scale(1)',opacity:1},{transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) scale(0)`,opacity:0}],
      {duration:700+Math.random()*500,easing:'cubic-bezier(.1,.9,.2,1)'}).onfinish=()=>p.remove();
  }
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
window.onload=()=>renderBanksList();
</script>
</body>
</html>
