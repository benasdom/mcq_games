<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ARCADE OVERDRIVE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

  :root {
    --void:    #02020A;
    --cyan:    #00FFFF;
    --magenta: #FF00FF;
    --amber:   #FFB300;
    --red:     #FF003C;
    --green:   #00FF88;
    --panel:   rgba(0,255,255,0.04);
    --font-display: 'Orbitron', monospace;
    --font-mono:    'Share Tech Mono', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--void);
    color: var(--cyan);
    font-family: var(--font-mono);
    overflow: hidden;
    height: 100vh; width: 100vw;
    user-select: none;
  }

  /* ── SCANLINE OVERLAY ── */
  body::after {
    content: "";
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.18) 4px);
    pointer-events: none; z-index: 9000;
  }

  /* ── FLASH ── */
  #flash {
    position: fixed; inset: 0;
    background: #fff; opacity: 0;
    pointer-events: none; z-index: 8999;
    mix-blend-mode: overlay;
  }
  @keyframes flash { 0%{opacity:.7} 100%{opacity:0} }
  .flashing { animation: flash .35s ease-out forwards !important; }

  /* ── SHAKE ── */
  @keyframes shake {
    0%,100%{ transform:translate(0,0) }
    20%{ transform:translate(-18px,10px) rotate(-2deg) }
    40%{ transform:translate(18px,-14px) rotate(2deg) }
    60%{ transform:translate(-10px,18px) rotate(-1deg) }
    80%{ transform:translate(10px,-10px) rotate(1deg) }
  }
  .shaking { animation: shake .45s ease both !important; }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    background: var(--void);
    transition: opacity .4s;
  }
  .screen.hidden { opacity:0; pointer-events:none; }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    gap: 20px;
    padding: 20px;
  }

  .title-svg-wrap { width: min(600px, 95vw); }

  .setup-actions {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    width: min(480px, 92vw);
  }

  /* neon button */
  .btn {
    font-family: var(--font-display);
    font-size: clamp(.7rem, 2.2vw, 1.1rem);
    letter-spacing: 3px;
    text-transform: uppercase;
    border: none; cursor: pointer;
    background: none;
    color: var(--cyan);
    width: 100%;
    padding: 0;
    position: relative;
  }
  .btn svg { width:100%; display:block; overflow:visible; }
  .btn .btn-text {
    pointer-events: none;
    position: absolute;
    inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: clamp(.65rem, 2vw, 1rem);
    font-weight: 700;
    letter-spacing: 4px;
    text-shadow: 0 0 12px currentColor;
  }
  .btn:hover .btn-rect { stroke-width: 3; filter: drop-shadow(0 0 12px currentColor); }
  .btn:hover .btn-text { color: #fff; }
  .btn:active { transform: scale(.97); }

  /* saved banks list */
  #banks-list {
    display: flex; flex-direction: column; gap: 8px;
    width: 100%; max-height: 200px; overflow-y: auto;
  }
  #banks-list::-webkit-scrollbar { width: 4px; }
  #banks-list::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; }

  .bank-entry {
    display: flex; align-items: center; gap: 8px;
  }
  .bank-entry .btn { flex: 1; }
  .bank-del {
    font-family: var(--font-mono); font-size: 1rem;
    background: none; border: 1px solid var(--red);
    color: var(--red); cursor: pointer; padding: 4px 10px;
    border-radius: 2px; flex-shrink: 0;
    text-shadow: 0 0 6px var(--red);
  }
  .bank-del:hover { background: var(--red); color: #000; }

  /* ── GAME SCREEN ── */
  #game-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    z-index: 50;
    pointer-events: none;
  }
  #game-screen.active { pointer-events: all; }

  /* SVG background that fills the whole screen */
  #bg-svg {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    z-index: 1; pointer-events: none;
  }

  /* HUD */
  #hud-svg {
    position: fixed; top: 0; left: 0;
    width: 100%; z-index: 60;
    pointer-events: none;
  }

  /* OPTIONS AREA */
  #options-area {
    position: fixed;
    top: 90px; left: 0; right: 0;
    display: flex; justify-content: space-around; align-items: center;
    flex-wrap: wrap; gap: 16px;
    padding: 10px 5vw;
    z-index: 70;
    pointer-events: all;
  }

  .opt-wrap {
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center;
    gap: 8px;
    animation: warpIn .5s cubic-bezier(.175,.885,.32,1.275) backwards;
  }
  @keyframes warpIn {
    0%{ transform: scale(0) translateY(-60px); opacity:0; filter:blur(8px); }
    70%{ transform: scale(1.1) translateY(8px); opacity:1; filter:blur(0); }
    100%{ transform: scale(1) translateY(0); opacity:1; }
  }
  .opt-wrap:hover .opt-svg { filter: drop-shadow(0 0 20px var(--magenta)); }
  .opt-wrap:hover .opt-svg .ring { stroke: var(--magenta); }
  .opt-wrap:hover .opt-svg .core { fill: var(--magenta); }
  .opt-wrap:active { transform: scale(.95); }

  .opt-svg { width: clamp(70px, 12vw, 110px); height: clamp(70px, 12vw, 110px); overflow: visible; }
  .opt-svg .ring { stroke: var(--cyan); fill: none; stroke-width: 2; transition: stroke .25s; }
  .opt-svg .core { fill: var(--cyan); transition: fill .25s; }

  .opt-label-svg { width: clamp(110px, 18vw, 170px); }

  /* QUESTION AREA */
  #question-area {
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 70;
    display: flex; flex-direction: column; align-items: center;
    gap: 10px;
    padding-bottom: 12px;
    background: linear-gradient(to top, rgba(2,2,10,.98) 60%, transparent);
    pointer-events: all;
  }

  #q-svg { width: min(900px, 96vw); }

  #next-btn-wrap {
    display: none;
  }
  #next-btn-wrap .btn { width: 280px; }

  /* COMBAT FLOAT */
  .combat-float {
    position: fixed;
    font-family: var(--font-display);
    font-size: clamp(1.4rem, 4vw, 2.5rem);
    font-weight: 900;
    letter-spacing: 3px;
    pointer-events: none;
    z-index: 500;
    text-shadow: 0 0 20px currentColor;
    animation: floatUp 1.1s ease-out forwards;
  }
  @keyframes floatUp {
    0%  { transform: translateY(0) scale(.6); opacity:0; }
    20% { transform: translateY(-20px) scale(1.4); opacity:1; }
    100%{ transform: translateY(-90px) scale(1); opacity:0; }
  }

  /* OVERLAY PANELS (checkpoint, extra life, game over) */
  .panel-overlay {
    position: fixed; inset: 0;
    background: rgba(2,2,10,.88);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 200;
    gap: 20px;
    backdrop-filter: blur(4px);
  }
  .panel-overlay.hidden { display: none; }
  .panel-svg-wrap { width: min(520px, 90vw); }

  /* LIVES ICONS row */
  #lives-icons {
    display: flex; gap: 6px; align-items: center;
  }

  /* scrollbar hide for banks */
  #banks-list { scrollbar-width: thin; scrollbar-color: var(--cyan) transparent; }

  @media (max-width: 480px) {
    #options-area { gap: 10px; padding: 8px 3vw; }
  }
  @media (max-height: 620px) {
    #options-area { top: 72px; }
  }
</style>
</head>
<body>

<div id="flash"></div>

<!-- ═══════════════════ SETUP SCREEN ═══════════════════ -->
<div id="setup-screen" class="screen">

  <!-- Animated title SVG -->
  <div class="title-svg-wrap">
    <svg viewBox="0 0 600 130" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-c">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-m">
          <feGaussianBlur stdDeviation="5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#00FFFF"/>
          <stop offset="50%" stop-color="#FF00FF"/>
          <stop offset="100%" stop-color="#00FFFF">
            <animate attributeName="offset" values="1;0;1" dur="4s" repeatCount="indefinite"/>
          </stop>
        </linearGradient>
      </defs>
      <!-- grid lines -->
      <line x1="0" y1="125" x2="600" y2="125" stroke="#00FFFF" stroke-width=".5" opacity=".4"/>
      <line x1="0" y1="5"   x2="600" y2="5"   stroke="#00FFFF" stroke-width=".5" opacity=".4"/>
      <!-- main title -->
      <text x="300" y="78" text-anchor="middle"
            font-family="'Orbitron',monospace" font-size="68" font-weight="900"
            fill="url(#title-grad)" filter="url(#glow-m)" letter-spacing="6">
        ARCADE
      </text>
      <!-- subtitle -->
      <text x="300" y="118" text-anchor="middle"
            font-family="'Orbitron',monospace" font-size="22" font-weight="700"
            fill="#FF00FF" filter="url(#glow-c)" letter-spacing="18" opacity=".9">
        OVERDRIVE
      </text>
      <!-- corner marks -->
      <g stroke="#00FFFF" stroke-width="2" fill="none" opacity=".6">
        <path d="M8,8 L8,22 M8,8 L22,8"/>
        <path d="M592,8 L592,22 M592,8 L578,8"/>
        <path d="M8,122 L8,108 M8,122 L22,122"/>
        <path d="M592,122 L592,108 M592,122 L578,122"/>
      </g>
      <!-- animated scan line -->
      <rect x="0" y="0" width="600" height="3" fill="#FF00FF" opacity=".25">
        <animate attributeName="y" values="0;130;0" dur="3s" repeatCount="indefinite"/>
      </rect>
    </svg>
  </div>

  <div class="setup-actions">
    <!-- upload -->
    <input type="file" id="file-input" accept=".json" style="display:none" multiple onchange="handleUpload(event)">
    <div class="btn" onclick="document.getElementById('file-input').click()" style="color:var(--magenta)">
      <svg viewBox="0 0 400 54" xmlns="http://www.w3.org/2000/svg">
        <rect class="btn-rect" x="2" y="2" width="396" height="50" rx="3" fill="rgba(255,0,255,0.06)" stroke="currentColor" stroke-width="2"/>
        <line x1="2" y1="2" x2="12" y2="2" stroke="currentColor" stroke-width="3"/>
        <line x1="2" y1="2" x2="2" y2="12" stroke="currentColor" stroke-width="3"/>
        <line x1="398" y1="52" x2="388" y2="52" stroke="currentColor" stroke-width="3"/>
        <line x1="398" y1="52" x2="398" y2="42" stroke="currentColor" stroke-width="3"/>
      </svg>
      <div class="btn-text" style="color:var(--magenta)">[ UPLOAD DATABANK ]</div>
    </div>

    <!-- saved banks -->
    <div id="banks-list"></div>

    <!-- default -->
    <div class="btn" onclick="useDefault()">
      <svg viewBox="0 0 400 54" xmlns="http://www.w3.org/2000/svg">
        <rect class="btn-rect" x="2" y="2" width="396" height="50" rx="3" fill="rgba(0,255,255,0.05)" stroke="currentColor" stroke-width="2"/>
        <line x1="2" y1="2" x2="12" y2="2" stroke="currentColor" stroke-width="3"/>
        <line x1="2" y1="2" x2="2" y2="12" stroke="currentColor" stroke-width="3"/>
        <line x1="398" y1="52" x2="388" y2="52" stroke="currentColor" stroke-width="3"/>
        <line x1="398" y1="52" x2="398" y2="42" stroke="currentColor" stroke-width="3"/>
      </svg>
      <div class="btn-text">&gt;&gt; INITIALIZE CORE &lt;&lt;</div>
    </div>
  </div>
</div>

<!-- ═══════════════════ GAME SCREEN ═══════════════════ -->
<div id="game-screen">

  <!-- FULL-PAGE SVG BACKGROUND -->
  <svg id="bg-svg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="bg-grad" cx="50%" cy="40%" r="55%">
        <stop offset="0%" stop-color="#0A0A1A"/>
        <stop offset="100%" stop-color="#02020A"/>
      </radialGradient>
      <pattern id="hex-grid" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
        <path d="M30,1 L59,17 L59,35 L30,51 L1,35 L1,17 Z" fill="none" stroke="rgba(0,255,255,0.06)" stroke-width="1"/>
      </pattern>
      <linearGradient id="floor-grad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="transparent"/>
        <stop offset="100%" stop-color="rgba(0,255,255,0.25)"/>
      </linearGradient>
      <filter id="glow2">
        <feGaussianBlur stdDeviation="4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Base fill -->
    <rect width="1000" height="700" fill="url(#bg-grad)"/>
    <!-- Hex grid -->
    <rect width="1000" height="700" fill="url(#hex-grid)"/>

    <!-- Perspective floor grid -->
    <g transform="translate(500,700) rotate(-90) scale(1)">
      <!-- horizontal lines with perspective illusion -->
      <g stroke="rgba(0,255,255,0.18)" stroke-width="1" fill="none">
        <line x1="-500" y1="30"  x2="500" y2="30"/>
        <line x1="-500" y1="90"  x2="500" y2="90"/>
        <line x1="-500" y1="170" x2="500" y2="170"/>
        <line x1="-500" y1="270" x2="500" y2="270"/>
        <line x1="-500" y1="400" x2="500" y2="400"/>
      </g>
      <!-- vertical convergence lines -->
      <g stroke="rgba(255,0,255,0.12)" stroke-width="1" fill="none">
        <line x1="0"    y1="0" x2="-80" y2="400"/>
        <line x1="0"    y1="0" x2="-200" y2="400"/>
        <line x1="0"    y1="0" x2="-350" y2="400"/>
        <line x1="0"    y1="0" x2="80"  y2="400"/>
        <line x1="0"    y1="0" x2="200" y2="400"/>
        <line x1="0"    y1="0" x2="350" y2="400"/>
      </g>
    </g>

    <!-- Decorative circuit traces left -->
    <g stroke="rgba(0,255,255,0.2)" stroke-width="1.5" fill="none">
      <path d="M0,200 L60,200 L60,160 L120,160 L120,200 L180,200"/>
      <circle cx="60"  cy="200" r="3" fill="rgba(0,255,255,0.4)"/>
      <circle cx="120" cy="200" r="3" fill="rgba(0,255,255,0.4)"/>
      <path d="M0,280 L40,280 L40,320 L100,320">
        <animate attributeName="stroke-dashoffset" values="0;-140" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M0,350 L80,350 L80,300 L160,300"/>
    </g>

    <!-- Decorative circuit traces right -->
    <g stroke="rgba(255,0,255,0.2)" stroke-width="1.5" fill="none">
      <path d="M1000,200 L940,200 L940,160 L880,160 L880,200 L820,200"/>
      <circle cx="940" cy="200" r="3" fill="rgba(255,0,255,0.4)"/>
      <circle cx="880" cy="200" r="3" fill="rgba(255,0,255,0.4)"/>
      <path d="M1000,300 L920,300 L920,340 L860,340">
        <animate attributeName="stroke-dashoffset" values="0;-140" dur="2.5s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Sun / horizon glow -->
    <ellipse cx="500" cy="700" rx="300" ry="80" fill="none" stroke="#FF00FF" stroke-width="2" opacity=".5"/>
    <ellipse cx="500" cy="700" rx="240" ry="55" fill="none" stroke="#FF00FF" stroke-width="1.5" opacity=".4"/>
    <ellipse cx="500" cy="700" rx="180" ry="35" fill="none" stroke="#00FFFF" stroke-width="1" opacity=".4"/>
    <ellipse cx="500" cy="700" rx="500" ry="120" fill="url(#floor-grad)" opacity=".15"/>

    <!-- Animated scan line on bg -->
    <rect x="0" y="0" width="1000" height="2" fill="#00FFFF" opacity=".08">
      <animate attributeName="y" values="0;700;0" dur="5s" repeatCount="indefinite"/>
    </rect>
  </svg>

  <!-- HUD SVG -->
  <svg id="hud-svg" viewBox="0 0 1000 90" xmlns="http://www.w3.org/2000/svg" style="height:90px">
    <defs>
      <linearGradient id="hud-fade" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"   stop-color="rgba(2,2,10,.95)"/>
        <stop offset="100%" stop-color="transparent"/>
      </linearGradient>
      <filter id="hud-glow">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <rect width="1000" height="90" fill="url(#hud-fade)"/>
    <line x1="0" y1="88" x2="1000" y2="88" stroke="rgba(0,255,255,0.15)" stroke-width="1"/>

    <!-- Score -->
    <text x="20" y="30" font-family="'Orbitron',monospace" font-size="11" fill="rgba(0,255,255,0.5)" letter-spacing="3">SCORE</text>
    <text id="hud-score" x="20" y="70" font-family="'Orbitron',monospace" font-size="36" font-weight="900" fill="#00FFFF" filter="url(#hud-glow)" letter-spacing="4">0000</text>

    <!-- Center title -->
    <text x="500" y="52" text-anchor="middle" font-family="'Orbitron',monospace" font-size="13" fill="rgba(0,255,255,0.3)" letter-spacing="10">ARCADE OVERDRIVE</text>

    <!-- Lives label -->
    <text x="980" y="30" text-anchor="end" font-family="'Orbitron',monospace" font-size="11" fill="rgba(0,255,255,0.5)" letter-spacing="3">SHIELDS</text>
    <!-- Lives bar group -->
    <g id="hud-lives-group" transform="translate(770,50)">
      <!-- filled dynamically by JS -->
    </g>

    <!-- Q counter -->
    <text id="hud-q" x="500" y="78" text-anchor="middle" font-family="'Share Tech Mono',monospace" font-size="13" fill="rgba(255,0,255,0.6)" letter-spacing="2">Q 1 / 1</text>

    <!-- corner marks -->
    <g stroke="#00FFFF" stroke-width="1.5" fill="none" opacity=".4">
      <path d="M5,5 L5,18 M5,5 L18,5"/>
      <path d="M995,5 L995,18 M995,5 L982,5"/>
    </g>
  </svg>

  <!-- OPTION TARGETS -->
  <div id="options-area"></div>

  <!-- LAUNCHER SVG (turret) -->
  <svg id="launcher-svg" xmlns="http://www.w3.org/2000/svg"
       style="position:fixed;bottom:200px;left:50%;transform:translateX(-50%);width:clamp(100px,16vw,160px);z-index:80;pointer-events:none;overflow:visible;">
    <defs>
      <radialGradient id="plasma-core" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#fff"/>
        <stop offset="35%"  stop-color="#FF00FF"/>
        <stop offset="100%" stop-color="transparent"/>
      </radialGradient>
      <linearGradient id="rail-glow" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" stop-color="#00FFFF"/>
        <stop offset="100%" stop-color="transparent"/>
      </linearGradient>
      <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#1E1E2E"/>
        <stop offset="60%"  stop-color="#0A0A1A"/>
        <stop offset="100%" stop-color="#02020A"/>
      </linearGradient>
      <filter id="turret-glow">
        <feGaussianBlur stdDeviation="5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Projectile -->
    <g id="bomb-g">
      <circle cx="100" cy="38" r="18" fill="url(#plasma-core)" filter="url(#turret-glow)">
        <animate attributeName="r" values="14;22;14" dur=".6s" repeatCount="indefinite"/>
      </circle>
      <ellipse cx="100" cy="38" rx="34" ry="8" fill="none" stroke="#fff" stroke-width="1.2" opacity=".7">
        <animateTransform attributeName="transform" type="rotate" from="0 100 38" to="360 100 38" dur="1.4s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="100" cy="38" rx="8" ry="34" fill="none" stroke="#FF00FF" stroke-width="2" opacity=".85">
        <animateTransform attributeName="transform" type="rotate" from="360 100 38" to="0 100 38" dur=".9s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- Turret body (viewBox 200x150, shifted) -->
    <g transform="translate(0,50)">
      <!-- Rails -->
      <path d="M72 0 L82 55 L90 55 L80 0 Z" fill="url(#rail-glow)" opacity=".8">
        <animate attributeName="opacity" values=".4;1;.4" dur="1s" repeatCount="indefinite"/>
      </path>
      <path d="M128 0 L118 55 L110 55 L120 0 Z" fill="url(#rail-glow)" opacity=".8">
        <animate attributeName="opacity" values=".4;1;.4" dur="1s" repeatCount="indefinite" begin=".5s"/>
      </path>
      <!-- Hexagonal base plate -->
      <polygon points="10,105 30,60 170,60 190,105 170,150 30,150" fill="url(#metal)" stroke="#00FFFF" stroke-width="3"/>
      <!-- Inner accent -->
      <polygon points="40,105 55,72 145,72 160,105 145,138 55,138" fill="#000" stroke="#FF00FF" stroke-width="1.5"/>
      <!-- Charging ring -->
      <ellipse cx="100" cy="62" rx="38" ry="12" fill="none" stroke="#00FFFF" stroke-width="2">
        <animate attributeName="stroke-width" values="1;5;1" dur=".8s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="100" cy="62" rx="24" ry="7" fill="#FF00FF" opacity=".5" style="filter:blur(3px)">
        <animate attributeName="opacity" values=".2;.8;.2" dur=".8s" repeatCount="indefinite"/>
      </ellipse>
      <!-- Side accents -->
      <line x1="25" y1="100" x2="50" y2="100" stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
      <line x1="175" y1="100" x2="150" y2="100" stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let questions      = [];
let currentIdx     = 0;
let score          = 0;
let lives          = 3;          // 3 shield units
let maxLives       = 3;
let isShooting     = false;
let audioCtx       = null;
let checkpointIdx  = null;       // index at 30% mark
let checkpointSaved = false;
let extraLifeGiven  = false;
let hasRevive       = false;     // earned at 50%
let currentBankKey  = null;

const LIVES_MAX     = 3;
const LS_PREFIX     = 'arcade_bank_';

// ─────────────────────────────────────────────
//  AUDIO
// ─────────────────────────────────────────────
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playSound(type) {
  if (!audioCtx) return;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  const t = audioCtx.currentTime;
  if (type === 'shoot') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(900, t);
    osc.frequency.exponentialRampToValueAtTime(80, t+.35);
    gain.gain.setValueAtTime(.28, t);
    gain.gain.exponentialRampToValueAtTime(.01, t+.35);
    osc.start(t); osc.stop(t+.35);
  } else if (type === 'hit') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(160, t);
    osc.frequency.exponentialRampToValueAtTime(40, t+.5);
    gain.gain.setValueAtTime(.4, t);
    gain.gain.exponentialRampToValueAtTime(.01, t+.5);
    osc.start(t); osc.stop(t+.5);
  } else if (type === 'miss') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(120, t);
    osc.frequency.linearRampToValueAtTime(40, t+.5);
    gain.gain.setValueAtTime(.4, t);
    gain.gain.linearRampToValueAtTime(.01, t+.5);
    osc.start(t); osc.stop(t+.5);
  } else if (type === 'powerup') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, t);
    osc.frequency.linearRampToValueAtTime(800, t+.3);
    gain.gain.setValueAtTime(.3, t);
    gain.gain.exponentialRampToValueAtTime(.01, t+.5);
    osc.start(t); osc.stop(t+.5);
  } else if (type === 'checkpoint') {
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(300, t);
    osc.frequency.linearRampToValueAtTime(600, t+.2);
    osc.frequency.linearRampToValueAtTime(450, t+.4);
    gain.gain.setValueAtTime(.25, t);
    gain.gain.exponentialRampToValueAtTime(.01, t+.4);
    osc.start(t); osc.stop(t+.4);
  }
}

// ─────────────────────────────────────────────
//  LOCAL STORAGE — BANKS
// ─────────────────────────────────────────────
function saveBank(name, data) {
  const key = LS_PREFIX + name;
  localStorage.setItem(key, JSON.stringify({ name, data, savedAt: Date.now() }));
  renderBanksList();
}

function loadBanks() {
  const banks = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith(LS_PREFIX)) {
      try { banks.push(JSON.parse(localStorage.getItem(k))); } catch(e) {}
    }
  }
  return banks;
}

function deleteBank(name) {
  localStorage.removeItem(LS_PREFIX + name);
  renderBanksList();
}

function renderBanksList() {
  const list = document.getElementById('banks-list');
  const banks = loadBanks();
  list.innerHTML = '';
  if (banks.length === 0) return;

  // header
  const hdr = document.createElementNS('http://www.w3.org/2000/svg','svg');
  hdr.setAttribute('viewBox','0 0 400 20');
  hdr.style.width = '100%';
  hdr.innerHTML = `<text x="0" y="14" font-family="'Share Tech Mono',monospace" font-size="11"
    fill="rgba(0,255,255,0.45)" letter-spacing="3">─── SAVED DATABANKS ───</text>`;
  list.appendChild(hdr);

  banks.sort((a,b)=>b.savedAt-a.savedAt).forEach(bank => {
    const wrap = document.createElement('div');
    wrap.className = 'bank-entry';

    const btn = document.createElement('div');
    btn.className = 'btn';
    btn.style.color = 'var(--green)';
    btn.onclick = () => { questions = bank.data; currentBankKey = bank.name; startGame(); };
    btn.innerHTML = `
      <svg viewBox="0 0 320 46" xmlns="http://www.w3.org/2000/svg">
        <rect class="btn-rect" x="1" y="1" width="318" height="44" rx="3"
          fill="rgba(0,255,136,0.05)" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <div class="btn-text" style="color:var(--green);font-size:.7rem;letter-spacing:2px">
        ${bank.name.substring(0,28)} &nbsp;<span style="opacity:.5">[${bank.data.length}Q]</span>
      </div>`;

    const del = document.createElement('button');
    del.className = 'bank-del';
    del.textContent = '✕';
    del.onclick = (e) => { e.stopPropagation(); deleteBank(bank.name); };

    wrap.appendChild(btn);
    wrap.appendChild(del);
    list.appendChild(wrap);
  });
}

// ─────────────────────────────────────────────
//  UPLOAD
// ─────────────────────────────────────────────
function handleUpload(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  let processed = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const name = file.name.replace(/\.json$/i,'');
        saveBank(name, parsed);
        processed++;
        if (processed === files.length) {
          // auto-start with last one
          questions = parsed;
          currentBankKey = name;
          initAudio();
          startGame();
        }
      } catch(err) {
        alert('ERR: CORRUPT DATA — ' + file.name);
      }
    };
    reader.readAsText(file);
  });
  e.target.value = '';
}

const defaultQuestions = [
  { question:"WHAT SDK POWERS UNIVERSAL REACT NATIVE APPS?", options:["FLUTTER","EXPO","CORDOVA","IONIC"], answer:"EXPO" },
  { question:"WHICH BUNDLER DELIVERS LIGHTNING FAST HMR?", options:["WEBPACK","PARCEL","VITE","ROLLUP"], answer:"VITE" },
  { question:"WHICH PLATFORM IS OPTIMIZED FOR SERVERLESS NEXT.JS?", options:["AWS EC2","DIGITALOCEAN","VERCEL","HEROKU"], answer:"VERCEL" },
  { question:"WHAT HOOK MANAGES SIDE EFFECTS IN REACT?", options:["useState","useEffect","useRef","useMemo"], answer:"useEffect" },
  { question:"WHICH CSS PROPERTY CREATES FLEX CONTAINERS?", options:["display:grid","display:flex","float:left","position:flex"], answer:"display:flex" },
  { question:"WHAT DOES CDN STAND FOR?", options:["Content Delivery Network","Core Data Node","Cloud Deploy Native","Cache Deploy Now"], answer:"Content Delivery Network" },
];

function useDefault() {
  questions = defaultQuestions;
  currentBankKey = 'DEFAULT';
  initAudio();
  startGame();
}

// ─────────────────────────────────────────────
//  GAME FLOW
// ─────────────────────────────────────────────
function startGame() {
  if (!questions.length) return;
  currentIdx       = 0;
  score            = 0;
  lives            = LIVES_MAX;
  checkpointIdx    = null;
  checkpointSaved  = false;
  extraLifeGiven   = false;
  hasRevive        = false;

  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.add('active');
  document.getElementById('gameover-panel').classList.add('hidden');
  document.getElementById('victory-panel').classList.add('hidden');

  updateHUD();
  loadQuestion();
}

function updateHUD() {
  document.getElementById('hud-score').textContent = score.toString().padStart(4,'0');
  document.getElementById('hud-q').textContent = `Q ${currentIdx+1} / ${questions.length}`;

  // lives as heart icons in SVG
  const g = document.getElementById('hud-lives-group');
  g.innerHTML = '';
  for (let i = 0; i < LIVES_MAX; i++) {
    const active = i < lives;
    const x = i * 50;
    const heart = document.createElementNS('http://www.w3.org/2000/svg','path');
    // heart centered at x+25, y=0 (group is already translated)
    const cx = x+25, cy = -10;
    heart.setAttribute('d',
      `M${cx},${cy+14} C${cx},${cy+14} ${cx-14},${cy+4} ${cx-14},${cy-4} C${cx-14},${cy-11} ${cx-7},${cy-17} ${cx},${cy-10} C${cx+7},${cy-17} ${cx+14},${cy-11} ${cx+14},${cy-4} C${cx+14},${cy+4} ${cx},${cy+14} ${cx},${cy+14} Z`
    );
    heart.setAttribute('fill', active ? '#00FF88' : 'rgba(0,255,136,0.12)');
    heart.setAttribute('stroke', active ? '#00FF88' : 'rgba(0,255,136,0.3)');
    heart.setAttribute('stroke-width','1.5');
    if (active) {
      heart.setAttribute('filter','url(#hud-glow)');
    }
    g.appendChild(heart);
  }
}

function checkMilestones() {
  const pct = currentIdx / questions.length;

  if (!checkpointSaved && pct >= 0.30) {
    checkpointSaved = true;
    checkpointIdx   = currentIdx;
    playSound('checkpoint');
    document.getElementById('checkpoint-panel').classList.remove('hidden');
  }

  if (!extraLifeGiven && pct >= 0.50) {
    extraLifeGiven = true;
    hasRevive      = true;
    if (lives < LIVES_MAX) lives = Math.min(LIVES_MAX, lives + 1);
    playSound('powerup');
    setTimeout(() => {
      document.getElementById('extralife-panel').classList.remove('hidden');
    }, checkpointSaved ? 200 : 0);
    updateHUD();
  }
}

function dismissPanel(id) {
  document.getElementById(id).classList.add('hidden');
}

function loadQuestion() {
  if (currentIdx >= questions.length) {
    showVictory(); return;
  }
  checkMilestones();

  isShooting = false;
  document.getElementById('next-btn-wrap').style.display = 'none';

  // reset bomb
  const bg = document.getElementById('bomb-g');
  bg.style.transition = 'none';
  bg.style.transform  = 'translate(0,0)';
  bg.style.opacity    = '1';

  const q = questions[currentIdx];
  setQText(q.question);

  const area = document.getElementById('options-area');
  area.innerHTML = '';

  q.options.forEach((opt, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'opt-wrap';
    wrap.style.animationDelay = `${i * 0.13}s`;

    // target SVG
    const tgt = `
    <svg class="opt-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="tgt-glow-${i}">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- outer frame -->
      <rect x="5" y="5" width="90" height="90" rx="4" fill="rgba(0,0,0,0.6)"
            stroke="rgba(0,255,255,0.4)" stroke-width="1.5"/>
      <!-- corner ticks -->
      <g stroke="#00FFFF" stroke-width="2" fill="none">
        <path d="M10,10 L10,18 M10,10 L18,10"/>
        <path d="M90,10 L90,18 M90,10 L82,10"/>
        <path d="M10,90 L10,82 M10,90 L18,90"/>
        <path d="M90,90 L90,82 M90,90 L82,90"/>
      </g>
      <!-- rotating ring -->
      <circle class="ring" cx="50" cy="50" r="30" stroke-dasharray="6 4">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="${5+i}s" repeatCount="indefinite"/>
      </circle>
      <!-- cross-hairs -->
      <line x1="50" y1="22" x2="50" y2="36" stroke="#00FFFF" stroke-width="1" opacity=".5"/>
      <line x1="50" y1="64" x2="50" y2="78" stroke="#00FFFF" stroke-width="1" opacity=".5"/>
      <line x1="22" y1="50" x2="36" y2="50" stroke="#00FFFF" stroke-width="1" opacity=".5"/>
      <line x1="64" y1="50" x2="78" y2="50" stroke="#00FFFF" stroke-width="1" opacity=".5"/>
      <!-- pulsing core -->
      <circle class="core" cx="50" cy="50" r="10" opacity=".8">
        <animate attributeName="r" values="8;14;8" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".6;1;.6" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="50" cy="50" r="4" fill="#fff" opacity=".9"/>
    </svg>`;

    // label SVG
    const labelSvg = buildLabelSVG(opt, i);

    wrap.innerHTML = tgt + labelSvg;
    wrap.onclick = () => shoot(wrap, opt === q.answer);
    area.appendChild(wrap);
  });
}

function buildLabelSVG(text, idx) {
  const colors = ['#00FFFF','#FF00FF','#FFB300','#00FF88'];
  const c = colors[idx % 4];
  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<svg class="opt-label-svg" viewBox="0 0 170 42" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="166" height="38" rx="3" fill="rgba(0,0,0,0.8)" stroke="${c}" stroke-width="1.5"/>
    <line x1="2" y1="2" x2="10" y2="2" stroke="${c}" stroke-width="2.5"/>
    <line x1="2" y1="2" x2="2" y2="10" stroke="${c}" stroke-width="2.5"/>
    <line x1="168" y1="40" x2="160" y2="40" stroke="${c}" stroke-width="2.5"/>
    <line x1="168" y1="40" x2="168" y2="32" stroke="${c}" stroke-width="2.5"/>
    <text x="85" y="22" text-anchor="middle" dominant-baseline="middle"
          font-family="'Orbitron',monospace" font-size="10" font-weight="700"
          fill="${c}" letter-spacing="2" style="text-shadow:0 0 8px ${c}">${escaped}</text>
  </svg>`;
}

function setQText(txt) {
  const el = document.getElementById('q-text');
  // truncate for display
  const max = 70;
  const display = txt.length > max ? txt.substring(0,max)+'…' : txt;
  el.textContent = display;
}

// ─────────────────────────────────────────────
//  SHOOT MECHANIC
// ─────────────────────────────────────────────
function shoot(targetEl, isCorrect) {
  if (isShooting) return;
  isShooting = true;
  initAudio();
  playSound('shoot');

  const bg       = document.getElementById('bomb-g');
  const launcher = document.getElementById('launcher-svg');
  const lRect    = launcher.getBoundingClientRect();
  const tRect    = targetEl.getBoundingClientRect();

  const fromX = lRect.left + lRect.width/2;
  const fromY = lRect.top  + 38 * (lRect.height / launcher.viewBox.baseVal.height);

  const toX   = tRect.left + tRect.width/2;
  const toY   = tRect.top  + tRect.height/2;

  const dx = toX - fromX;
  const dy = toY - fromY;

  // scale factor from SVG coords to screen
  const scale = lRect.width / launcher.viewBox.baseVal.width;
  const moveX = dx / scale;
  const moveY = dy / scale;

  bg.style.transition = 'transform 0.3s cubic-bezier(0.5,0,1,1), opacity 0.1s';
  bg.style.transform  = `translate(${moveX}px, ${moveY}px) scale(0.4)`;

  setTimeout(() => {
    bg.style.opacity = '0';
    const color = isCorrect
      ? getComputedStyle(document.body).getPropertyValue('--green').trim()
      : getComputedStyle(document.body).getPropertyValue('--red').trim();

    createExplosion(toX, toY, color);
    spawnCombatText(toX - 60, toY - 20, isCorrect ? 'CRITICAL!' : 'DEFLECTED', color);

    if (isCorrect) {
      playSound('hit');
      triggerFlash();
      score += 1000;
      targetEl.style.visibility = 'hidden';
      setQText('▸ TARGET OBLITERATED');
      document.getElementById('next-btn-wrap').style.display = 'block';
    } else {
      playSound('miss');
      lives = Math.max(0, lives - 1);
      document.getElementById('game-screen').classList.add('shaking');
      setTimeout(() => document.getElementById('game-screen').classList.remove('shaking'), 460);

      if (lives <= 0) {
        setTimeout(showGameOver, 600);
      } else {
        setQText('⚠ INTEGRITY COMPROMISED — SHIELDS: ' + lives + ' REMAINING');
        setTimeout(loadQuestion, 1800);
      }
    }
    updateHUD();
  }, 310);
}

function nextQuestion() {
  currentIdx++;
  loadQuestion();
}

// ─────────────────────────────────────────────
//  PANELS
// ─────────────────────────────────────────────
function showGameOver() {
  document.getElementById('go-score').textContent = 'FINAL SCORE: ' + score.toString().padStart(4,'0');

  const cpTxt = document.getElementById('go-checkpoint');
  cpTxt.textContent = checkpointIdx !== null
    ? `CHECKPOINT AT Q${checkpointIdx+1} AVAILABLE`
    : '';

  const rvTxt = document.getElementById('go-revive');
  rvTxt.textContent = hasRevive ? '◆ EXTRA LIFE REVIVE READY' : '';

  document.getElementById('revive-btn-wrap').style.display = hasRevive ? 'block' : 'none';
  document.getElementById('checkpoint-resume-btn').style.display = checkpointIdx !== null ? 'block' : 'none';

  document.getElementById('gameover-panel').classList.remove('hidden');
}

function revive() {
  if (!hasRevive) return;
  hasRevive = false;
  lives = LIVES_MAX;
  document.getElementById('gameover-panel').classList.add('hidden');
  updateHUD();
  loadQuestion(); // stay at same question
}

function resumeCheckpoint() {
  if (checkpointIdx === null) return;
  currentIdx = checkpointIdx;
  lives = LIVES_MAX;
  score = Math.max(0, score - 500); // small penalty
  document.getElementById('gameover-panel').classList.add('hidden');
  updateHUD();
  loadQuestion();
}

function showVictory() {
  document.getElementById('v-score').textContent = 'SCORE: ' + score.toString().padStart(4,'0');
  document.getElementById('victory-panel').classList.remove('hidden');
}

function backToMenu() {
  document.getElementById('gameover-panel').classList.add('hidden');
  document.getElementById('victory-panel').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('active');
  document.getElementById('setup-screen').classList.remove('hidden');
  renderBanksList();
}

// ─────────────────────────────────────────────
//  VFX
// ─────────────────────────────────────────────
function triggerFlash() {
  const f = document.getElementById('flash');
  f.classList.remove('flashing');
  void f.offsetWidth;
  f.classList.add('flashing');
}

function spawnCombatText(x, y, text, color) {
  const el = document.createElement('div');
  el.className = 'combat-float';
  el.style.left  = x + 'px';
  el.style.top   = y + 'px';
  el.style.color = color;
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function createExplosion(cx, cy, color) {
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    const size = Math.random() * 14 + 5;
    p.style.cssText = `
      position:fixed; left:${cx}px; top:${cy}px;
      width:${size}px; height:${size}px;
      background:${i%3===0?'#fff':color};
      border-radius:50%;
      box-shadow:0 0 ${size*2}px ${color};
      pointer-events:none; z-index:999;`;
    document.body.appendChild(p);
    const angle    = (Math.PI*2/18)*i;
    const dist     = 80 + Math.random()*130;
    const tx = Math.cos(angle)*dist;
    const ty = Math.sin(angle)*dist;
    p.animate([
      {transform:'translate(0,0) scale(1)', opacity:1},
      {transform:`translate(${tx}px,${ty}px) scale(0)`, opacity:0}
    ],{duration:700+Math.random()*500, easing:'cubic-bezier(.1,.9,.2,1)'}
    ).onfinish = () => p.remove();
  }
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
window.onload = () => {
  renderBanksList();
};
</script>
